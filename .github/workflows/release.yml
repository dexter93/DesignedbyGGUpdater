name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: DesignedbyGGUpdater

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            platform: linux/amd64
            build_flags: -tags webkit2_41
            artifact_name: DesignedbyGGUpdater-linux-amd64
            
          - name: Windows
            os: windows-latest
            platform: windows/amd64
            build_flags: ""
            artifact_name: DesignedbyGGUpdater-windows-amd64.exe
            
          - name: macOS (Intel)
            os: macos-latest
            platform: darwin/amd64
            build_flags: ""
            artifact_name: DesignedbyGGUpdater-darwin-amd64
            
          - name: macOS (Apple Silicon)
            os: macos-latest
            platform: darwin/arm64
            build_flags: ""
            artifact_name: DesignedbyGGUpdater-darwin-arm64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libhidapi-dev \
            libudev-dev \
            pkg-config

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: brew install hidapi

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build application (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.build_flags }} -clean

      - name: Build application (Windows)
        if: matrix.os == 'windows-latest'
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Build application (macOS)
        if: matrix.os == 'macos-latest'
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Package Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/bin
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ env.APP_NAME }}
          mv ${{ matrix.artifact_name }}.tar.gz ../

      - name: Package Windows binary
        if: matrix.os == 'windows-latest'
        run: |
          cd build/bin
          Compress-Archive -Path ${{ env.APP_NAME }}.exe -DestinationPath ../${{ matrix.artifact_name }}.zip

      - name: Package macOS binary (Intel)
        if: matrix.os == 'macos-latest' && matrix.platform == 'darwin/amd64'
        run: |
          cd build/bin
          zip -r ../${{ matrix.artifact_name }}.zip ${{ env.APP_NAME }}.app

      - name: Package macOS binary (Apple Silicon)
        if: matrix.os == 'macos-latest' && matrix.platform == 'darwin/arm64'
        run: |
          cd build/bin
          zip -r ../${{ matrix.artifact_name }}.zip ${{ env.APP_NAME }}.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/*.tar.gz
            build/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}